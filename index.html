<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Freelance Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:   var(--tg-theme-bg-color,#ffffff);
  --bg2:  var(--tg-theme-secondary-bg-color,#f1f1f1);
  --text: var(--tg-theme-text-color,#000000);
  --hint: var(--tg-theme-hint-color,#888888);
  --link: var(--tg-theme-link-color,#2481cc);
  --btn:  var(--tg-theme-button-color,#2481cc);
  --btnt: var(--tg-theme-button-text-color,#ffffff);
  --sep:  rgba(0,0,0,.08);
  --red:  #e74c3c;
  --ton:  #0098ea;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding-bottom:80px}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg);position:sticky;top:0;z-index:100;padding:8px 10px;gap:6px;box-shadow:0 1px 0 var(--sep)}
.tab{flex:1;padding:9px 0 8px;text-align:center;font-size:11px;color:var(--hint);cursor:pointer;border-radius:11px;border-bottom:none;transition:all .18s;user-select:none;font-weight:500}
.tab.active{background:var(--btn);color:var(--btnt);font-weight:700}
.tab i{font-size:20px;display:block;margin-bottom:2px;font-style:normal}

/* ── PAGE ── */
.page{display:none;padding:14px}
.page.active{display:block}

/* ── SUMMARY ── */
.summary{background:var(--btn);background-image:linear-gradient(145deg,rgba(255,255,255,.12) 0%,rgba(0,0,0,.18) 100%);color:var(--btnt);border-radius:20px;padding:20px 22px 22px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.18)}
.sum-left .amount{font-size:38px;font-weight:800;letter-spacing:-.5px;line-height:1.05}
.sum-left .label{font-size:12px;opacity:.75;margin-top:5px;letter-spacing:.1px}
.sum-badge{background:rgba(255,255,255,.18);border-radius:16px;padding:8px 16px;font-size:18px;font-weight:800;min-width:44px;text-align:center;align-self:flex-start}

/* ── CARD ── */
.card{background:var(--bg);border-radius:18px;padding:14px 16px;margin-bottom:9px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 14px rgba(0,0,0,.1);cursor:pointer;transition:transform .12s,opacity .12s;-webkit-user-select:none}
.card:active{transform:scale(.98);opacity:.85}
.card.closed{opacity:.5}
.av{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.av-d{background:var(--btn);color:var(--btnt)}
.av-g{background:var(--ton);color:#fff;font-size:24px}
.cbody{flex:1;min-width:0}
.ctitle{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csub{font-size:12px;color:var(--hint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.camt{font-size:17px;font-weight:800}
.camt.red{color:var(--red)}
.camt.blue{color:var(--ton)}
.card-chev{font-size:18px;color:var(--hint);opacity:.25;flex-shrink:0;margin-left:2px;align-self:center;line-height:1}
.ctitle-wrap{font-weight:700;font-size:15px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3;word-break:break-word}
.bdg{font-size:10px;border-radius:9px;padding:3px 8px;font-weight:700;white-space:nowrap}
.bdg-days{background:rgba(231,76,60,.12);color:var(--red)}
.bdg-green{background:rgba(39,174,96,.12);color:#27ae60}
.bdg-done{background:var(--bg2);color:var(--hint)}
.bdg-ton{background:rgba(0,152,234,.12);color:var(--ton)}

/* ── SKELETON ── */
.skel{border-radius:18px;margin-bottom:9px;height:76px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg) 50%,var(--bg2) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── EMPTY ── */
.empty{text-align:center;padding:56px 20px;color:var(--hint)}
.empty i{font-size:52px;display:block;margin-bottom:14px;font-style:normal}
.empty b{display:block;font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty span{font-size:14px;line-height:1.5}

/* ── OVERLAY / MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;animation:fadeIn .2s}
.ov.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg);border-radius:24px 24px 0 0;padding:0 18px env(safe-area-inset-bottom,24px);width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.32,1.25,.4,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:var(--hint);opacity:.25;border-radius:2px;margin:14px auto 20px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px}

/* ── FORM ── */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:13px 14px;border:1.5px solid var(--sep);border-radius:12px;font-size:15px;background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--btn);background:var(--bg)}
.frow{display:flex;gap:10px}
.frow .fg{flex:1}

/* ── BUTTONS ── */
.btn-p{width:100%;padding:15px;background:var(--btn);color:var(--btnt);border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-p:disabled{opacity:.5}
.btn-o{width:100%;padding:13px;background:none;color:var(--btn);border:1.5px solid var(--btn);border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-d{width:100%;padding:13px;background:rgba(231,76,60,.08);color:var(--red);border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px}

/* ── DETAIL ── */
.det-head{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.det-av{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;background:var(--btn);color:var(--btnt);flex-shrink:0}
.det-info h4{font-size:18px;font-weight:800;letter-spacing:-.2px}
.det-info p{font-size:13px;color:var(--hint);margin-top:3px}
.det-total{background:var(--bg2);border-radius:12px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.det-total span{font-size:13px;color:var(--hint)}
.det-total b{font-size:22px;font-weight:700;color:var(--red)}
.hist-hd{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--sep);font-size:14px}
.hist-row:last-child{border-bottom:none}
.hist-empty{color:var(--hint);font-size:13px;text-align:center;padding:10px 0}
.div{height:1px;background:var(--sep);margin:14px 0}

/* ── TON TAB ── */
.ton-panel{background:var(--bg);border-radius:20px;padding:4px 18px;margin-bottom:14px;box-shadow:0 2px 14px rgba(0,0,0,.1)}
.ton-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--sep)}
.ton-row:last-child{border-bottom:none}
.ton-lbl{font-size:14px;color:var(--hint)}
.ton-val{font-size:15px;font-weight:600}
.ton-val.blue{color:var(--ton)}
.ton-inp{background:var(--bg2);border:1.5px solid var(--sep);border-radius:12px;font-size:15px;font-weight:600;color:var(--ton);text-align:right;outline:none;width:140px;padding:10px 12px;font-family:inherit;-webkit-appearance:none}
.ton-inp:focus{border-color:var(--ton);background:var(--bg)}
.ton-val.hero{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.ton-rate-age{font-size:11px;color:var(--hint);margin-left:6px;font-weight:400}

/* ── CLOSE DATE INPUT ── */
.close-wrap{margin-bottom:13px}
/* ── SAVE DATE ROW ── */
.save-date-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:13px}
.save-date-row .fg{flex:1;margin-bottom:0}
.btn-save{padding:12px 14px;background:var(--btn);color:var(--btnt);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
/* ── SECTION HEADER ── */
.sect-hd{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;padding:16px 0 8px;border-top:1px solid var(--sep);margin-top:4px;display:flex;justify-content:space-between;align-items:center}
/* ── SIGN TOGGLE ── */
.sign-wrap{display:flex;gap:8px;align-items:flex-end;margin-bottom:13px}
.sign-wrap .fg{flex:1;margin-bottom:0}
.sign-toggle{display:flex;border:1.5px solid var(--sep);border-radius:10px;overflow:hidden;height:46px;flex-shrink:0}
.sign-btn{width:38px;border:none;background:var(--bg2);color:var(--hint);font-size:20px;font-weight:700;cursor:pointer;transition:all .15s;padding:0;display:flex;align-items:center;justify-content:center;line-height:1}
.sign-btn.active-add{background:rgba(36,129,204,.18);color:var(--btn)}
.sign-btn.active-sub{background:rgba(231,76,60,.18);color:var(--red)}
/* ── HIST ACCENT ROW ── */
.hist-acc-row{display:flex;align-items:stretch;padding:9px 0;border-bottom:1px solid var(--sep)}
.hist-acc-row:last-child{border-bottom:none}
.hist-acc{width:3px;border-radius:3px;flex-shrink:0;margin-right:10px;align-self:stretch;min-height:28px}
/* ── ICON PICKER ── */
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:4px 0 12px}
.icon-item{aspect-ratio:1;border-radius:12px;border:2.5px solid transparent;cursor:pointer;overflow:hidden;transition:border-color .15s}
.icon-item.selected{border-color:var(--btn)}
.icon-item img{width:100%;height:100%;object-fit:cover;display:block}
/* ── DEADLINE INLINE ── */
.dl-inline{text-align:center;padding:0 0 14px;cursor:pointer;user-select:none}
/* ── DATE CHIPS ── */
.date-chips{display:flex;gap:6px;margin-bottom:10px}
.date-chip{flex:1;padding:9px 6px;border:1.5px solid var(--sep);border-radius:10px;background:var(--bg2);color:var(--hint);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;font-family:inherit}
.date-chip.active{background:var(--btn);color:var(--btnt);border-color:var(--btn)}
/* ── SEARCH ── */
.search-inp{width:100%;padding:10px 13px;border:1.5px solid var(--sep);border-radius:10px;font-size:15px;background:var(--bg);color:var(--text);outline:none;margin-bottom:8px}
.search-inp:focus{border-color:var(--btn)}
/* ── SORT ── */
.sort-bar{display:flex;justify-content:flex-end;margin-bottom:8px}
.sort-toggle-btn{padding:7px 14px;background:var(--bg);border:1.5px solid var(--sep);border-radius:12px;font-size:13px;font-weight:600;color:var(--hint);cursor:pointer}
.sort-toggle-btn.active{background:var(--btn);color:var(--btnt);border-color:var(--btn)}
.sort-arrows{display:flex;flex-direction:column;gap:3px;flex-shrink:0;margin-right:2px}
.sort-arrow{width:30px;height:30px;border:1.5px solid var(--sep);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.sort-arrow:active{background:var(--btn);color:var(--btnt)}
/* ── GIFT IMAGE ZONE ── */
.g-img-zone{border:1.5px dashed var(--sep);border-radius:10px;height:90px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--hint);margin-bottom:13px;background-size:cover;background-position:center;background-repeat:no-repeat;cursor:pointer;overflow:hidden;transition:border-color .2s}
.g-img-zone.has-img{border-color:var(--btn)}
/* ── LOCKED SCREEN ── */
.locked{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;color:var(--hint)}
.locked i{font-size:64px;display:block;margin-bottom:20px}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('debts')"><i>💸</i>Фрилансы</div>
  <div class="tab" onclick="showTab('gifts')"><i>🎁</i>Подарки</div>
  <div class="tab" onclick="showTab('ton')"><i>💎</i>TON</div>
</div>

<!-- ── DEBTS ── -->
<div id="tab-debts" class="page active">
  <div id="debts-summary"></div>
  <div id="debts-list"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
</div>

<!-- ── GIFTS ── -->
<div id="tab-gifts" class="page">
  <div id="gifts-summary"></div>
  <input class="search-inp" id="gift-search" placeholder="Поиск: коллекция, модель, фон..." oninput="giftSearch=this.value.trim();renderGifts()">
  <div id="gifts-list"><div class="skel"></div><div class="skel"></div></div>
</div>

<!-- ── TON ── -->
<div id="tab-ton" class="page">
  <div class="ton-panel" id="ton-panel">
    <div class="ton-row">
      <span class="ton-lbl">Мой баланс TON</span>
      <input class="ton-inp" id="ton-bal" type="text" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Куплено подарков</span>
      <span class="ton-val blue" id="ton-gifts-total">—</span>
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Портфель в TON</span>
      <span class="ton-val blue" id="ton-portfolio-ton">—</span>
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Курс TON<span class="ton-rate-age" id="ton-age"></span></span>
      <span class="ton-val" id="ton-rate-val">—</span>
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Портфель в ₽</span>
      <span class="ton-val hero" id="ton-portfolio">—</span>
    </div>
  </div>
</div>

<!-- ── MODAL: ADD DEBT ── -->
<div class="ov" id="ov-debt-add" onclick="bgClose(event,'ov-debt-add')">
  <div class="modal">
    <div class="handle"></div>
    <h3>Добавить долг</h3>
    <div class="fg"><label>Компания / Студия</label><input id="d-co" placeholder="СберБанк" autocomplete="off"></div>
    <div class="fg"><label>Проект</label><input id="d-pr" placeholder="Сайт" autocomplete="off"></div>
    <div class="fg"><label>Менеджер</label><input id="d-mg" placeholder="Гриша" autocomplete="off"></div>
    <button class="btn-p" id="d-submit" onclick="addDebt()">Добавить</button>
  </div>
</div>

<!-- ── MODAL: DEBT DETAIL ── -->
<div class="ov" id="ov-debt-det" onclick="bgClose(event,'ov-debt-det')">
  <div class="modal">
    <div class="handle"></div>
    <div id="det-content"></div>
  </div>
</div>

<!-- ── MODAL: GIFT DETAIL ── -->
<div class="ov" id="ov-gift-det" onclick="bgClose(event,'ov-gift-det')">
  <div class="modal">
    <div class="handle"></div>
    <div id="gift-det-content"></div>
  </div>
</div>

<!-- ── MODAL: ADD GIFT ── -->
<div class="ov" id="ov-gift-add" onclick="bgClose(event,'ov-gift-add')">
  <div class="modal">
    <div class="handle"></div>
    <h3>Добавить подарок</h3>
    <div class="frow">
      <div class="fg"><label>Коллекция</label><input id="g-col" list="dl-col" placeholder="Sakura" autocomplete="off"><datalist id="dl-col"></datalist></div>
      <div class="fg"><label>Модель / Стикер</label><input id="g-mod" list="dl-mod" placeholder="Silver Cat" autocomplete="off"><datalist id="dl-mod"></datalist></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Фон</label><input id="g-bg" list="dl-bg" placeholder="Blue" autocomplete="off"><datalist id="dl-bg"></datalist></div>
      <div class="fg"><label>Цена (TON)</label><input id="g-pr" type="number" step="0.01" inputmode="decimal" placeholder="12.5"></div>
    </div>
    <div class="fg"><label>Дата покупки</label><input id="g-dt" type="date"></div>
    <div class="fg"><label>Маркет</label><input id="g-mk" list="dl-mk" placeholder="Fragment" autocomplete="off"><datalist id="dl-mk"></datalist></div>
    <div class="fg"><label>Фото (Ctrl+V)</label><div class="g-img-zone" id="g-img-zone">📋 Вставьте скриншот</div></div>
    <button class="btn-p" id="g-submit" onclick="addGift()">Добавить</button>
  </div>
</div>

<script>
const API = 'https://n8n.omut.studio/webhook';
const tg  = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.expand(); tg.ready(); }

let debts = [], gifts = [], curDebt = null, curGift = null;
let tonRate = null, tonRateAt = 0, curTab = 'debts';
let _giftImgData = null;
let sortMode = null;
let giftSearch = '';
let _detHistOpen = false;
let _workSign = 1;
let _dlEditOpen = false;
let _iconPickOpen = false;
let _workDate = '';
let _datePickOpen = false;
var ICONS = Array.from({length:12}, function(_,i){ return 'https://faserobbin-tech.github.io/freelance-miniapp/icons/Icon_'+(i+1)+'.png'; });

function toggleDetHist() { _detHistOpen = !_detHistOpen; renderDet(); }
function toggleDlEdit()  { _dlEditOpen  = !_dlEditOpen;  renderDet(); }
function toggleIconPick(){ _iconPickOpen = !_iconPickOpen; renderDet(); }
function setWorkDate(type) {
  var today = new Date().toISOString().split('T')[0];
  var yest  = new Date(Date.now()-86400000).toISOString().split('T')[0];
  if (type === 'today')     { _workDate = today; _datePickOpen = false; renderDet(); }
  else if (type === 'yest') { _workDate = yest;  _datePickOpen = false; renderDet(); }
  else if (type === 'pick') { _datePickOpen = !_datePickOpen; renderDet(); }
  else if (type === 'custom') {
    var v = document.getElementById('det-pay-dt-custom');
    if (v && v.value) { _workDate = v.value; renderDet(); }
  }
}
function setWorkSign(s) {
  _workSign = s;
  document.querySelectorAll('.sign-btn').forEach(function(btn, i) {
    btn.className = 'sign-btn' + (i===0 ? (s===1?' active-add':'') : (s===-1?' active-sub':''));
  });
}
function getDebtIcon(id) { var n=parseInt(localStorage.getItem('icon_'+id)||'0'); return (n>=1&&n<=12)?n:null; }
function setDebtIcon(id,num) { localStorage.setItem('icon_'+id, String(num)); }
function defaultIcon(company) {
  var h=0, s=String(company||'');
  for(var i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
  return (Math.abs(h)%12)+1;
}
function getOrDefaultIcon(id,company) { return getDebtIcon(id) || defaultIcon(company); }
function pickIcon(num) {
  setDebtIcon(curDebt.id, num);
  _iconPickOpen = false;
  haptic('light');
  renderDet();
  renderDebts();
}

function clientColor(name) {
  var palette = ['#e74c3c','#e67e22','#27ae60','#2980b9','#8e44ad','#16a085','#d35400','#c0392b','#2471a3','#1e8449','#6c3483','#117a65'];
  var h = 0, s = String(name||'');
  for (var i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h<<5) - h);
  return palette[Math.abs(h) % palette.length];
}

function renderSparkline(history) {
  if (!history || history.length < 2) return '';
  var byDay = {};
  history.forEach(function(h) {
    var day = h.date ? h.date.split('T')[0] : null;
    if (day) byDay[day] = (byDay[day]||0) + Number(h.amount||0);
  });
  var days = Object.keys(byDay).sort();
  if (days.length < 2) return '';
  var vals = days.map(function(d){ return byDay[d]; });
  var maxV = Math.max.apply(null, vals.map(Math.abs));
  if (!maxV) return '';
  var H = 44, gap = 2, bw = Math.max(4, Math.floor((260 - gap*days.length) / days.length));
  var W = days.length * (bw + gap);
  var bars = vals.map(function(v, i) {
    var bh = Math.max(3, Math.round(Math.abs(v)/maxV*(H-4)));
    var x = i*(bw+gap), y = H-bh;
    return '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="2" fill="'+(v<0?'#e74c3c':'#2481cc')+'" opacity="0.85"/>';
  }).join('');
  return '<div class="hist-hd" style="margin-top:14px">Активность</div>'
    + '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:'+H+'px;display:block;margin-bottom:4px">'+bars+'</svg>';
} // 'debts' | 'gifts' | null

// ── ORDER ─────────────────────────────────────────
function getOrder(key) { try { return JSON.parse(localStorage.getItem('ord_'+key)||'[]'); } catch(e){ return []; } }
function setOrder(key, arr) { localStorage.setItem('ord_'+key, JSON.stringify(arr)); }
function applyOrder(items, key) {
  var order = getOrder(key);
  if (!order.length) return items.slice();
  var map = {}; items.forEach(function(x){ map[x.id]=x; });
  var sorted = [];
  order.forEach(function(id){ if(map[id]){ sorted.push(map[id]); delete map[id]; } });
  Object.keys(map).forEach(function(id){ sorted.push(map[id]); });
  return sorted;
}
function toggleSort(type) {
  sortMode = (sortMode===type) ? null : type;
  if (type==='debts') renderDebts(); else renderGifts();
}
function moveItem(type, id, dir) {
  var key = type;
  var items = type==='debts' ? debts.filter(function(d){return !d.closedAt;}) : gifts.slice().reverse();
  var ordered = applyOrder(items, key);
  var idx = ordered.findIndex ? ordered.findIndex(function(x){return x.id===id;}) : (function(){ for(var i=0;i<ordered.length;i++) if(ordered[i].id===id) return i; return -1; })();
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= ordered.length) return;
  var tmp = ordered[idx]; ordered[idx]=ordered[newIdx]; ordered[newIdx]=tmp;
  setOrder(key, ordered.map(function(x){return x.id;}));
  haptic('light');
  if (type==='debts') renderDebts(); else renderGifts();
}

// ── AUTOCOMPLETE ──────────────────────────────────
function getAC(field) { try { return JSON.parse(localStorage.getItem('ac_'+field)||'[]'); } catch(e){ return []; } }
function addAC(field, val) {
  if (!val) return;
  var arr = getAC(field);
  var i = arr.indexOf(val); if (i!==-1) arr.splice(i,1);
  arr.unshift(val); if(arr.length>40) arr.pop();
  localStorage.setItem('ac_'+field, JSON.stringify(arr));
}
function updateDL(dlId, field) {
  var dl = document.getElementById(dlId); if(!dl) return;
  dl.innerHTML = getAC(field).map(function(v){ return '<option value="'+esc(v)+'">'; }).join('');
}

function resizeImage(dataURL, maxPx, cb) {
  var img = new Image();
  img.onload = function() {
    var s = Math.min(maxPx/img.width, maxPx/img.height, 1);
    var c = document.createElement('canvas');
    c.width = img.width*s; c.height = img.height*s;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    cb(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = dataURL;
}

document.addEventListener('paste', function(e) {
  var inAdd = document.getElementById('ov-gift-add').classList.contains('open');
  var inDet = document.getElementById('ov-gift-det').classList.contains('open');
  if (!inAdd && !inDet) return;
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      var blob = items[i].getAsFile();
      var reader = new FileReader();
      reader.onload = function(ev) {
        resizeImage(ev.target.result, 400, function(small) {
          if (inAdd) {
            _giftImgData = small;
            var zone = document.getElementById('g-img-zone');
            if (zone) { zone.style.backgroundImage='url('+small+')'; zone.textContent=''; zone.classList.add('has-img'); }
          } else if (inDet && curGift) {
            try { localStorage.setItem('gimg_'+curGift.id, small); } catch(x){}
            var zone = document.getElementById('gd-img-zone');
            if (zone) { zone.style.backgroundImage='url('+small+')'; zone.textContent=''; zone.classList.add('has-img'); }
            renderGifts();
          }
          haptic('light');
        });
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});

// ── UTILS ─────────────────────────────────────────
function fmt(n) { return new Intl.NumberFormat('ru-RU').format(Math.round(Number(n||0))) + '\u00A0₽'; }
function fmtTon(n) { return (+n||0).toFixed(2) + '\u00A0TON'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(s) {
  var p = String(s||'').trim().split(/\s+/);
  return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : String(s||'?')[0].toUpperCase();
}
function daysSince(d) {
  if (!d) return '';
  var days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (days === 0) return 'сегодня';
  if (days === 1) return 'вчера';
  if (days < 7)  return days + '\u00A0дн.';
  if (days < 30) return Math.floor(days/7) + '\u00A0нед.';
  if (days < 365) return Math.floor(days/30) + '\u00A0мес.';
  return Math.floor(days/365) + '\u00A0г.';
}
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return d; }
}
function fmtDateTime(d) {
  if (!d) return '';
  try {
    var dt = new Date(d);
    return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short'}).replace(/\s*г\.$/,'')
      + ' · ' + dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  } catch(e) { return d; }
}
function fmtDateShort(d) {
  if (!d) return '';
  try {
    var dt = new Date(d.length === 10 ? d + 'T12:00:00' : d);
    return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short'}).replace(/\s*г\.$/,'');
  } catch(e) { return d; }
}
function debtTotal(d) {
  return (d.history||[]).reduce(function(s,h){ return s+Number(h.amount||0); },0);
}
function getDeadline(id) {
  try { return JSON.parse(localStorage.getItem('dl_'+id)||'null'); } catch(e){ return null; }
}
function setDeadline(id, date) {
  if (date) localStorage.setItem('dl_'+id, JSON.stringify(date));
  else localStorage.removeItem('dl_'+id);
}
function deadlineBadge(deadline) {
  if (!deadline) return '';
  var ms = new Date(deadline).getTime() - Date.now();
  var days = Math.ceil(ms / 86400000);
  if (days > 0) return '<div class="bdg bdg-green">через '+days+'\u00A0дн.</div>';
  if (days === 0) return '<div class="bdg bdg-days">сегодня</div>';
  return '<div class="bdg bdg-days">'+Math.abs(days)+'\u00A0дн. просрочен</div>';
}
function haptic(type) { try { if(tg) tg.HapticFeedback.impactOccurred(type||'medium'); } catch(e){} }
function notify(type) { try { if(tg) tg.HapticFeedback.notificationOccurred(type||'success'); } catch(e){} }

        + '</div>'

        + '<div class="cbody"><div class="ctitle">'+esc(d.company)+'</div>'
        + '<div class="csub">'+esc(d.project)+(d.manager?' · '+esc(d.manager):'')+'</div></div>'
        + '<div class="cright"><div class="camt">'+fmt(tot)+'</div>'
        + deadlineBadge(dl)+'</div></div>';
    } else {
      html += '<div class="card" onclick="openDebtDet(\''+esc(d.id)+'\')">'
        + avHtml
        + '<div class="cbody"><div class="ctitle">'+esc(d.company)+'</div>'
        + '<div class="csub">'+esc(d.project)+(d.manager?' · '+esc(d.manager):'')+'</div></div>'
        + '<div class="cright"><div class="camt">'+fmt(tot)+'</div>'

      + '<img src="'+icnC+'" class="av" style="object-fit:cover;display:block">'
      + '<div class="cbody"><div class="ctitle">'+esc(d.company)+'</div>'
      + '<div class="csub">'+esc(d.project)+'</div></div>'
      + '<div class="cright"><div class="camt">'+fmt(Number(d.amount||0))+'</div>'
      + '<div class="bdg bdg-done">закрыт'+( ds?' '+ds:'')+'</div>'

  });
  if (!html) html = '<div class="empty"><i>📭</i><b>Долгов нет</b><span>Нажмите + чтобы добавить</span></div>';
  document.getElementById('debts-list').innerHTML = html;
}

function openDebtDet(id) {

    + '<div style="font-size:44px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1">'+fmt(tot)+'</div>'
    + '</div>';

  // ── ДЕДЛАЙН — строчка под суммой, кликабельная ──
  if (dl) {
    var ms = new Date(dl).getTime() - Date.now();
    var days = Math.ceil(ms / 86400000);
    var dlLabel = days > 0 ? 'через '+days+'\u00A0дн.' : (days === 0 ? 'сегодня' : Math.abs(days)+'\u00A0дн. просрочен');
    var dlColor = days <= 0 ? 'var(--red)' : (days <= 7 ? '#e67e22' : 'var(--hint)');
    html += '<div class="dl-inline" onclick="toggleDlEdit()">'
      + '<span style="font-size:13px;color:'+dlColor+'">до '+fmtDateShort(dl)+'</span>'
      + '<span style="font-size:12px;color:var(--hint)"> · '+dlLabel+'</span>'
      + '</div>';
  } else {
    html += '<div class="dl-inline" onclick="toggleDlEdit()">'
      + '<span style="font-size:13px;color:var(--hint)">+ Дедлайн</span>'
      + '</div>';
  }
  if (_dlEditOpen) {
    html += '<div class="save-date-row" style="margin-bottom:14px">'
      + '<div class="fg"><input id="det-close-dt" type="date" value="'+esc(dl)+'"></div>'
      + '<button class="btn-save" onclick="saveDeadline()">Сохранить</button>'
      + '</div>';
  }

  // ── ЗАПИСАТЬ РАБОТУ ──
  var today = new Date().toISOString().split('T')[0];
  var yest  = new Date(Date.now()-86400000).toISOString().split('T')[0];
  var isToday = _workDate === today;
  var isYest  = _workDate === yest;
  var isCustom = !isToday && !isYest;
  var pickLabel = isCustom
    ? fmtDateShort(_workDate) + (_datePickOpen ? ' ▲' : ' ▼')
    : (_datePickOpen ? 'Другая ▲' : 'Другая ▼');
  html += '<div class="sect-hd">Записать работу</div>';
  // 1. Сумма + знак
  html += '<div class="sign-wrap">'
    + '<div class="fg"><label>Сумма (₽)</label><input id="det-pay-am" type="number" inputmode="numeric" placeholder="5000"></div>'
    + '<div class="sign-toggle">'
    + '<button class="sign-btn'+(_workSign===1?' active-add':'')+'" onclick="setWorkSign(1)">＋</button>'
    + '<button class="sign-btn'+(_workSign===-1?' active-sub':'')+'" onclick="setWorkSign(-1)">−</button>'

  html += '<button class="btn-p" id="det-pay-btn" onclick="addWork()">Записать</button>';

  html += '<div class="sect-hd" style="cursor:pointer;margin-top:14px" onclick="toggleDetHist()">'
    + 'История работы' + (histCount ? ' <span style="background:var(--bg2);border-radius:8px;padding:1px 7px;font-size:10px">'+histCount+'</span>' : '')
    + '<span style="font-size:13px;color:var(--btn);margin-left:auto">'+(_detHistOpen?'▲':'▼')+'</span>'
    + '</div>';

      // ── Группировка по дням (локальная дата, не UTC) ──
      var histRev = hist.slice().reverse();
      var dayGroups = [], dayMap = {};
      histRev.forEach(function(h) {
        var dk;
        if (h.date && h.date.length > 10) {
          var d0 = new Date(h.date);
          dk = d0.getFullYear()+'-'+(d0.getMonth()+1).toString().padStart(2,'0')+'-'+d0.getDate().toString().padStart(2,'0');
        } else { dk = h.date || 'nodate'; }
        if (!dayMap[dk]) { dayMap[dk] = []; dayGroups.push({key:dk, entries:dayMap[dk]}); }
        dayMap[dk].push(h);
      });
      dayGroups.forEach(function(g) {
        // ── Разделитель дня ──
        html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 0 4px">'
          + '<span style="font-size:12px;font-weight:700;color:var(--hint);letter-spacing:.3px;white-space:nowrap">'+fmtDateShort(g.key)+'</span>'
          + '<span style="flex:1;height:1px;background:var(--sep);display:block"></span>'
          + '</div>';
        g.entries.forEach(function(h) {
          var amNum = Number(h.amount||0);
          var amColor = amNum < 0 ? 'var(--red)' : 'var(--btn)';
          var accColor = amNum < 0 ? '#e74c3c' : '#2481cc';
          var amStr = (amNum > 0 ? '+' : '') + fmt(h.amount);
          // Время: только для старых записей (ISO timestamp) — новые (date-only) времени не имеют
          var timeStr = (!h.recordedAt && h.date && h.date.length > 10)
            ? new Date(h.date).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) : '';
          html += '<div class="hist-acc-row">'
            + '<div class="hist-acc" style="background:'+accColor+'"></div>'
            + '<div style="flex:1;min-width:0">'
            + (timeStr ? '<div style="font-size:13px;color:var(--hint)">'+timeStr+'</div>' : '')
            + (h.comment ? '<div style="font-size:11px;color:var(--hint);margin-top:'+(timeStr?'2px':'0')+'">'+esc(h.comment)+'</div>' : '')
            + (!timeStr && !h.comment ? '<div style="font-size:12px;color:var(--hint)">—</div>' : '')
            + '</div>'
            + '<span style="font-weight:700;color:'+amColor+';white-space:nowrap;margin-left:10px;font-size:14px">'+amStr+'</span>'
            + '</div>';
        });
      });
    } else {
      html += '<div class="hist-empty">Записей ещё нет</div>';
    }
  }

  html += '<div class="div"></div>';
  html += '<button class="btn-d" onclick="delDebt()">Удалить</button>';

  document.getElementById('det-content').innerHTML = html;
}
function saveDeadline() {
  var dt = document.getElementById('det-close-dt');
  var val = dt ? dt.value : '';
  setDeadline(curDebt.id, val || null);
  curDebt._deadline = val || null;
  _dlEditOpen = false;
  haptic('light');
  notify('success');
  renderDet();
  renderDebts();
}
function addWork() {
  var am = document.getElementById('det-pay-am').value.trim();
  var cm = document.getElementById('det-pay-cm').value.trim();
  var dt = _workDate;
  if (!am || Number(am) === 0) { if(tg) tg.showAlert('Введите сумму'); else alert('Введите сумму'); return; }
  var signedAm = String(Math.abs(Number(am)) * _workSign);
  var btn=document.getElementById('det-pay-btn'); btn.disabled=true;
  var today = new Date().toISOString().split('T')[0];
  var nowISO = new Date().toISOString();
  var apiDate, localEntry;
  if (dt && dt !== today) {
    // Пользователь выбрал другую дату — это дата работы, записываем отдельно от времени записи
    apiDate = dt;
    localEntry = {amount:Number(signedAm), date:dt, recordedAt:nowISO, comment:cm};
  } else {
    apiDate = nowISO;
    localEntry = {amount:Number(signedAm), date:nowISO, comment:cm};
  }
  fetch(API+'/freelance-api-history?id='+encodeURIComponent(curDebt.id)+'&amount='+encodeURIComponent(signedAm)+'&comment='+encodeURIComponent(cm)+'&date='+encodeURIComponent(apiDate))
    .then(function(r){return r.json();})
    .then(function(d){
      btn.disabled=false;
      if(d.ok){ notify('success'); curDebt.history=curDebt.history||[]; curDebt.history.push(localEntry); renderDet(); loadDebts(); }
    }).catch(function(){ btn.disabled=false; });
}
function delDebt() {
  function go() {
    haptic('heavy');
    fetch(API+'/freelance-api-del?id='+encodeURIComponent(curDebt.id))
      .then(function(r){return r.json();})
      .then(function(d){ if(d.ok){ notify('success'); closeDebtDet(); loadDebts(); } });
  }
  if(tg) tg.showConfirm('Удалить долг «'+curDebt.company+'»?', function(ok){ if(ok) go(); });
  else if(confirm('Удалить?')) go();
}

// ── GIFTS ─────────────────────────────────────────
function loadGifts() {
  fetch(API+'/freelance-gifts').then(r=>r.json()).then(function(d) {
    gifts = d.gifts || [];
    var pending = localStorage.getItem('gimg_pending');
    if (pending && gifts.length) {
      var last = gifts[gifts.length-1];
      if (last && last.id && !localStorage.getItem('gimg_'+last.id)) {
        try { localStorage.setItem('gimg_'+last.id, pending); localStorage.removeItem('gimg_pending'); } catch(e){}
      }
    }
    renderGifts();
    renderTon();
  }).catch(function() {
    document.getElementById('gifts-list').innerHTML = '<div class="empty"><i>⚠️</i><b>Ошибка загрузки</b></div>';
  });
}

function renderGifts() {
  var totTon = gifts.reduce(function(s,g){ return s+Number(g.price||0); },0);
  var sum = document.getElementById('gifts-summary');
  if (gifts.length) {
    var rubStr = (tonRate ? ' · ' + fmt(totTon*tonRate) : '');
    sum.innerHTML = '<div class="summary"><div class="sum-left"><div class="amount">'+fmtTon(totTon)+'</div><div class="label">потрачено на подарки'+rubStr+'</div></div><div class="sum-badge">'+gifts.length+'</div></div>';
  } else { sum.innerHTML = ''; }

  var isSortG = sortMode === 'gifts';
  var orderedGifts = applyOrder(gifts.slice().reverse(), 'gifts');
  if (giftSearch) {
    var q = giftSearch.toLowerCase();
    orderedGifts = orderedGifts.filter(function(g) {
      return (g.collection||'').toLowerCase().indexOf(q)!==-1
        || (g.model||'').toLowerCase().indexOf(q)!==-1
        || (g.background||'').toLowerCase().indexOf(q)!==-1
        || (g.market||'').toLowerCase().indexOf(q)!==-1;
    });
  }
  var html = '<div class="sort-bar"><button class="sort-toggle-btn'+(isSortG?' active':'')+'" onclick="toggleSort(\'gifts\')">'+(isSortG?'✓ Готово':'⇅ Порядок')+'</button></div>';
  orderedGifts.forEach(function(g) {
    var title = esc(g.collection)+(g.model?' · '+esc(g.model):'');
    var subParts = []; if(g.background) subParts.push(esc(g.background)); if(g.market) subParts.push(esc(g.market)); if(!subParts.length && g.date) subParts.push(fmtDateShort(g.date));
    var sub = subParts.join(' · ');
    var rubBdg = (tonRate&&g.price) ? ' <span class="bdg bdg-days">≈'+fmt(Number(g.price)*tonRate)+'</span>' : '';
    var gImg = g.id ? localStorage.getItem('gimg_'+g.id) : null;
    var avHtml = gImg
      ? '<div class="av av-g" style="background-image:url('+gImg+');background-size:cover;background-position:center"></div>'
      : '<div class="av av-g">🎁</div>';
    if (isSortG) {
      html += '<div class="card" style="cursor:default;align-items:flex-start">'
        + '<div class="sort-arrows">'
        + '<button class="sort-arrow" onclick="moveItem(\'gifts\',\''+esc(g.id)+'\',-1)">↑</button>'
        + '<button class="sort-arrow" onclick="moveItem(\'gifts\',\''+esc(g.id)+'\',1)">↓</button>'
        + '</div>'
        + avHtml
        + '<div class="cbody"><div class="ctitle-wrap">'+title+'</div><div class="csub">'+sub+'</div></div>'
        + '<div class="cright"><div class="camt blue">'+fmtTon(g.price)+'</div>'+rubBdg
        + '<div class="bdg bdg-ton">'+fmtDateShort(g.date||'')+'</div></div></div>';
    } else {
      html += '<div class="card" style="align-items:flex-start" onclick="openGiftDet(\''+esc(g.id)+'\')">'
        + avHtml
        + '<div class="cbody"><div class="ctitle-wrap">'+title+'</div><div class="csub">'+sub+'</div></div>'
        + '<div class="cright"><div class="camt blue">'+fmtTon(g.price)+'</div>'+rubBdg
        + '<div class="bdg bdg-ton">'+fmtDateShort(g.date||'')+'</div></div>'
        + '<span class="card-chev">›</span></div>';
    }
  });
  if (orderedGifts.length===0) html = '<div class="empty"><i>🎁</i><b>Подарков нет</b><span>Нажмите + чтобы добавить</span></div>';
  document.getElementById('gifts-list').innerHTML = html;
}

// ── ADD GIFT ──────────────────────────────────────
function openGiftAdd() {
  haptic('light');
  ['g-col','g-mod','g-bg','g-pr','g-mk'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('g-dt').value = new Date().toISOString().split('T')[0];
  _giftImgData = null;
  updateDL('dl-col','col'); updateDL('dl-mod','mod'); updateDL('dl-bg','bg'); updateDL('dl-mk','mk');
  var zone = document.getElementById('g-img-zone');
  if (zone) { zone.style.backgroundImage=''; zone.textContent='📋 Вставьте скриншот'; zone.classList.remove('has-img'); }
  document.getElementById('ov-gift-add').classList.add('open');
  if(tg) tg.BackButton.show(), tg.BackButton.onClick(closeGiftAdd);
  setTimeout(function(){ document.getElementById('g-per').focus(); },300);
}
function closeGiftAdd() {
  document.getElementById('ov-gift-add').classList.remove('open');
  if(tg) tg.BackButton.hide();
}
function addGift() {
  var col=document.getElementById('g-col').value.trim();
  var mod=document.getElementById('g-mod').value.trim();
  var bg=document.getElementById('g-bg').value.trim();
  var pr=document.getElementById('g-pr').value.trim();
  var dt=document.getElementById('g-dt').value;
  var mk=document.getElementById('g-mk').value.trim();
  if (!col) { if(tg) tg.showAlert('Укажите коллекцию'); else alert('Укажите коллекцию'); return; }
  var btn=document.getElementById('g-submit'); btn.disabled=true;
  fetch(API+'/freelance-gifts-add?person=&collection='+encodeURIComponent(col)+'&model='+encodeURIComponent(mod)+'&background='+encodeURIComponent(bg)+'&price='+encodeURIComponent(pr)+'&date='+encodeURIComponent(dt)+'&market='+encodeURIComponent(mk)+'&gift='+encodeURIComponent(col+(mod?' '+mod:'')))
    .then(function(r){return r.json();})
    .then(function(d){
      btn.disabled=false;
      if(d.ok){
        notify('success');
        addAC('col',col); addAC('mod',mod); addAC('bg',bg); addAC('mk',mk);
        if(_giftImgData) {
          if (d.id) {
            try { localStorage.setItem('gimg_'+d.id, _giftImgData); } catch(e){}
          } else {
            try { localStorage.setItem('gimg_pending', _giftImgData); } catch(e){}
          }
          _giftImgData = null;
        }
        closeGiftAdd(); loadGifts();
      } else { if(tg) tg.showAlert('Ошибка'); else alert('Ошибка'); }
    }).catch(function(){ btn.disabled=false; });
}
function openGiftDet(id) {
  haptic('light');
  curGift = gifts.find(function(g){ return g.id===id; });
  if (!curGift) return;
  renderGiftDet();
  document.getElementById('ov-gift-det').classList.add('open');
  if(tg) { setupMainBtn('Закрыть', closeGiftDet); tg.BackButton.show(); tg.BackButton.onClick(closeGiftDet); }
}
function closeGiftDet() {
  document.getElementById('ov-gift-det').classList.remove('open');
  if(tg) { tg.BackButton.hide(); setupMainBtn('Добавить подарок', openGiftAdd); }
  curGift = null;
}
function renderGiftDet() {
  var g = curGift; if(!g) return;
  var gImg = g.id ? localStorage.getItem('gimg_'+g.id) : null;
  var zoneHtml = gImg
    ? '<div class="g-img-zone has-img" id="gd-img-zone" style="background-image:url('+gImg+');height:160px"></div>'
    : '<div class="g-img-zone" id="gd-img-zone" style="height:160px">📋 Вставьте фото (Ctrl+V)</div>';

  var html = '<div class="det-head">'
    + '<div class="det-av" style="background:var(--ton)">🎁</div>'
    + '<div class="det-info"><h4>'+esc(g.collection||'Подарок')+'</h4>'
    + '<p>'+esc(g.model||'')+(g.background?' · '+esc(g.background):'')+'</p></div></div>';

  html += '<div class="fg"><label>Фото</label>'+zoneHtml+'</div>';

  html += '<div class="ton-panel" style="margin:12px 0">';
  html += '<div class="ton-row"><span class="ton-lbl">Цена</span><span style="font-size:18px;font-weight:800;color:var(--ton)">'+fmtTon(g.price)+'</span></div>';
  if (g.collection) html += '<div class="ton-row"><span class="ton-lbl">Коллекция</span><span style="font-weight:600;font-size:14px">'+esc(g.collection)+'</span></div>';
  if (g.model)      html += '<div class="ton-row"><span class="ton-lbl">Модель</span><span style="font-weight:600;font-size:14px">'+esc(g.model)+'</span></div>';
  if (g.background) html += '<div class="ton-row"><span class="ton-lbl">Фон</span><span style="font-weight:600;font-size:14px">'+esc(g.background)+'</span></div>';
  if (g.date)       html += '<div class="ton-row"><span class="ton-lbl">Дата</span><span style="font-weight:600;font-size:14px">'+fmtDateShort(g.date)+'</span></div>';
  if (g.market)     html += '<div class="ton-row"><span class="ton-lbl">Маркет</span><span style="font-weight:600;font-size:14px">'+esc(g.market)+'</span></div>';
  if (tonRate&&g.price) html += '<div class="ton-row"><span class="ton-lbl">В рублях</span><span style="font-weight:600;font-size:14px">≈'+fmt(Number(g.price)*tonRate)+'</span></div>';
  html += '</div>';

  html += '<div class="div"></div>';
  html += '<button class="btn-d" onclick="delGiftFromDet()">Удалить</button>';

  document.getElementById('gift-det-content').innerHTML = html;
}
function delGiftFromDet() {
  if (!curGift) return;
  function go() {
    haptic('heavy');
    var id = curGift.id;
    fetch(API+'/freelance-gifts-del?id='+encodeURIComponent(id))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){
          notify('success');
          try { localStorage.removeItem('gimg_'+id); } catch(e){}
          closeGiftDet(); loadGifts();
        }
      });
  }
  var name = curGift.collection+(curGift.model?' · '+curGift.model:'');
  if(tg) tg.showConfirm('Удалить «'+name+'»?', function(ok){ if(ok) go(); });
  else if(confirm('Удалить?')) go();
}

// ── TON ───────────────────────────────────────────
function loadTonRate() {
  fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=rub')
    .then(function(r){return r.json();})
    .then(function(d){
      var r = d['the-open-network'] && d['the-open-network']['rub'];
      if(r){ tonRate=r; tonRateAt=Date.now(); renderTon(); if(curTab==='gifts') renderGifts(); }
    }).catch(function(){});
}
function renderTon() {
  var bal    = parseFloat(document.getElementById('ton-bal').value)||0;
  var gifts_sum = gifts.reduce(function(s,g){ return s+Number(g.price||0); },0);
  document.getElementById('ton-gifts-total').textContent = fmtTon(gifts_sum);
  document.getElementById('ton-portfolio-ton').textContent = fmtTon(bal + gifts_sum);
  if (tonRate) {
    var age = Math.floor((Date.now()-tonRateAt)/60000);
    document.getElementById('ton-rate-val').textContent = fmt(tonRate).replace('\u00A0₽','') + '\u00A0₽';
    document.getElementById('ton-age').textContent = age < 1 ? ' · только что' : ' · '+age+'\u00A0мин. назад';
    var portfolio = (bal + gifts_sum) * tonRate;
    document.getElementById('ton-portfolio').textContent = fmt(portfolio);
  }
}

document.getElementById('ton-bal').addEventListener('input', function(){
  if (/^[\d\.\s]*$/.test(this.value)) {
    localStorage.setItem('ton_bal', this.value);
    renderTon();
  }
});
document.getElementById('ton-bal').addEventListener('keydown', function(e){
  if (e.key === 'Enter') {
    var val = this.value.trim();
    if (/^[\d\s\+\-\*\/\.\(\)]+$/.test(val)) {
      try {
        var result = Function('return (' + val + ')')();
        if (typeof result === 'number' && isFinite(result)) {
          this.value = parseFloat(result.toFixed(4));
          localStorage.setItem('ton_bal', this.value);
          renderTon();
          haptic('light');
        }
      } catch(e) {}
    }
    e.preventDefault();
    this.blur();
  }
});
document.getElementById('ton-bal').value = localStorage.getItem('ton_bal') || '';

// ── MODAL HELPERS ─────────────────────────────────
function bgClose(e, id) {
  if (e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('open');
    if(tg) tg.BackButton.hide();
  }
}

  var uid = tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id;
  if (uid && uid !== 252162840) {

    return;
  }
  loadDebts();
  setupMainBtn('Добавить', openDebtAdd);
  loadTonRate();
})();
