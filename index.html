<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Freelance Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:   var(--tg-theme-bg-color,#ffffff);
  --bg2:  var(--tg-theme-secondary-bg-color,#f1f1f1);
  --text: var(--tg-theme-text-color,#000000);
  --hint: var(--tg-theme-hint-color,#888888);
  --link: var(--tg-theme-link-color,#2481cc);
  --btn:  var(--tg-theme-button-color,#2481cc);
  --btnt: var(--tg-theme-button-text-color,#ffffff);
  --sep:  rgba(0,0,0,.08);
  --red:  #e74c3c;
  --ton:  #0098ea;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding-bottom:80px}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--sep);position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.tab{flex:1;padding:11px 0 9px;text-align:center;font-size:11px;color:var(--hint);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.tab.active{color:var(--btn);border-bottom-color:var(--btn);font-weight:700}
.tab i{font-size:20px;display:block;margin-bottom:2px;font-style:normal}

/* ── PAGE ── */
.page{display:none;padding:12px}
.page.active{display:block}

/* ── SUMMARY ── */
.summary{background:var(--btn);color:var(--btnt);border-radius:16px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.sum-left .amount{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.sum-left .label{font-size:12px;opacity:.8;margin-top:3px}
.sum-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:6px 14px;font-size:14px;font-weight:700}

/* ── CARD ── */
.card{background:var(--bg);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:transform .12s,opacity .12s;-webkit-user-select:none}
.card:active{transform:scale(.98);opacity:.85}
.card.closed{opacity:.5}
.av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.av-d{background:var(--btn);color:var(--btnt)}
.av-g{background:var(--ton);color:#fff;font-size:22px}
.cbody{flex:1;min-width:0}
.ctitle{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csub{font-size:12px;color:var(--hint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.camt{font-size:15px;font-weight:700}
.camt.red{color:var(--red)}
.camt.blue{color:var(--ton)}
.bdg{font-size:10px;border-radius:8px;padding:2px 7px;font-weight:700;white-space:nowrap}
.bdg-days{background:rgba(231,76,60,.12);color:var(--red)}
.bdg-green{background:rgba(39,174,96,.12);color:#27ae60}
.bdg-done{background:var(--bg2);color:var(--hint)}
.bdg-ton{background:rgba(0,152,234,.12);color:var(--ton)}

/* ── SKELETON ── */
.skel{border-radius:14px;margin-bottom:8px;height:72px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg) 50%,var(--bg2) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── EMPTY ── */
.empty{text-align:center;padding:56px 20px;color:var(--hint)}
.empty i{font-size:52px;display:block;margin-bottom:14px;font-style:normal}
.empty b{display:block;font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty span{font-size:14px;line-height:1.5}

/* ── OVERLAY / MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;animation:fadeIn .2s}
.ov.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:0 16px env(safe-area-inset-bottom,20px);width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.32,1.25,.4,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:var(--hint);opacity:.3;border-radius:2px;margin:12px auto 18px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px}

/* ── FORM ── */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:12px 13px;border:1.5px solid var(--sep);border-radius:10px;font-size:15px;background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--btn);background:var(--bg)}
.frow{display:flex;gap:10px}
.frow .fg{flex:1}

/* ── BUTTONS ── */
.btn-p{width:100%;padding:14px;background:var(--btn);color:var(--btnt);border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-p:disabled{opacity:.5}
.btn-o{width:100%;padding:12px;background:none;color:var(--btn);border:1.5px solid var(--btn);border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-d{width:100%;padding:12px;background:none;color:var(--red);border:none;border-radius:12px;font-size:15px;cursor:pointer;margin-top:4px}

/* ── DETAIL ── */
.det-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.det-av{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;background:var(--btn);color:var(--btnt);flex-shrink:0}
.det-info h4{font-size:17px;font-weight:700}
.det-info p{font-size:13px;color:var(--hint);margin-top:2px}
.det-total{background:var(--bg2);border-radius:12px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.det-total span{font-size:13px;color:var(--hint)}
.det-total b{font-size:22px;font-weight:700;color:var(--red)}
.hist-hd{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--sep);font-size:14px}
.hist-row:last-child{border-bottom:none}
.hist-empty{color:var(--hint);font-size:13px;text-align:center;padding:10px 0}
.div{height:1px;background:var(--sep);margin:14px 0}

/* ── TON TAB ── */
.ton-panel{background:var(--bg);border-radius:16px;padding:4px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ton-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--sep)}
.ton-row:last-child{border-bottom:none}
.ton-lbl{font-size:14px;color:var(--hint)}
.ton-val{font-size:15px;font-weight:600}
.ton-val.blue{color:var(--ton)}
.ton-inp{background:none;border:none;border-bottom:2px solid var(--ton);font-size:15px;font-weight:600;color:var(--ton);text-align:right;outline:none;width:130px;padding:2px 0;font-family:inherit}
.ton-rate-age{font-size:11px;color:var(--hint);margin-left:6px;font-weight:400}

/* ── CLOSE DATE INPUT ── */
.close-wrap{margin-bottom:13px}
/* ── SAVE DATE ROW ── */
.save-date-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:13px}
.save-date-row .fg{flex:1;margin-bottom:0}
.btn-save{padding:12px 14px;background:var(--btn);color:var(--btnt);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
/* ── SORT ── */
.sort-bar{display:flex;justify-content:flex-end;margin-bottom:8px}
.sort-toggle-btn{padding:6px 13px;background:var(--bg);border:1.5px solid var(--sep);border-radius:10px;font-size:13px;font-weight:600;color:var(--hint);cursor:pointer}
.sort-toggle-btn.active{background:var(--btn);color:var(--btnt);border-color:var(--btn)}
.sort-arrows{display:flex;flex-direction:column;gap:3px;flex-shrink:0;margin-right:2px}
.sort-arrow{width:30px;height:30px;border:1.5px solid var(--sep);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.sort-arrow:active{background:var(--btn);color:var(--btnt)}
/* ── GIFT IMAGE ZONE ── */
.g-img-zone{border:1.5px dashed var(--sep);border-radius:10px;height:90px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--hint);margin-bottom:13px;background-size:cover;background-position:center;background-repeat:no-repeat;cursor:pointer;overflow:hidden;transition:border-color .2s}
.g-img-zone.has-img{border-color:var(--btn)}
/* ── LOCKED SCREEN ── */
.locked{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;color:var(--hint)}
.locked i{font-size:64px;display:block;margin-bottom:20px}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('debts')"><i>💸</i>Фрилансы</div>
  <div class="tab" onclick="showTab('gifts')"><i>🎁</i>Подарки</div>
  <div class="tab" onclick="showTab('ton')"><i>💎</i>TON</div>
</div>

<!-- ── DEBTS ── -->
<div id="tab-debts" class="page active">
  <div id="debts-summary"></div>
  <div id="debts-list"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
</div>

<!-- ── GIFTS ── -->
<div id="tab-gifts" class="page">
  <div id="gifts-summary"></div>
  <div id="gifts-list"><div class="skel"></div><div class="skel"></div></div>
</div>

<!-- ── TON ── -->
<div id="tab-ton" class="page">
  <div class="ton-panel" id="ton-panel">
    <div class="ton-row">
      <span class="ton-lbl">Мой баланс TON</span>
      <input class="ton-inp" id="ton-bal" type="text" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Куплено подарков</span>
      <span class="ton-val blue" id="ton-gifts-total">—</span>
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Портфель в TON</span>
      <span class="ton-val blue" id="ton-portfolio-ton">—</span>
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Курс TON<span class="ton-rate-age" id="ton-age"></span></span>
      <span class="ton-val" id="ton-rate-val">—</span>
    </div>
    <div class="ton-row">
      <span class="ton-lbl">Портфель в ₽</span>
      <span class="ton-val blue" id="ton-portfolio">—</span>
    </div>
  </div>
</div>

<!-- ── MODAL: ADD DEBT ── -->
<div class="ov" id="ov-debt-add" onclick="bgClose(event,'ov-debt-add')">
  <div class="modal">
    <div class="handle"></div>
    <h3>Добавить долг</h3>
    <div class="fg"><label>Компания / Студия</label><input id="d-co" placeholder="СберБанк" autocomplete="off"></div>
    <div class="fg"><label>Проект</label><input id="d-pr" placeholder="Сайт" autocomplete="off"></div>
    <div class="fg"><label>Менеджер</label><input id="d-mg" placeholder="Гриша" autocomplete="off"></div>
    <button class="btn-p" id="d-submit" onclick="addDebt()">Добавить</button>
  </div>
</div>

<!-- ── MODAL: DEBT DETAIL ── -->
<div class="ov" id="ov-debt-det" onclick="bgClose(event,'ov-debt-det')">
  <div class="modal">
    <div class="handle"></div>
    <div id="det-content"></div>
  </div>
</div>

<!-- ── MODAL: GIFT DETAIL ── -->
<div class="ov" id="ov-gift-det" onclick="bgClose(event,'ov-gift-det')">
  <div class="modal">
    <div class="handle"></div>
    <div id="gift-det-content"></div>
  </div>
</div>

<!-- ── MODAL: ADD GIFT ── -->
<div class="ov" id="ov-gift-add" onclick="bgClose(event,'ov-gift-add')">
  <div class="modal">
    <div class="handle"></div>
    <h3>Добавить подарок</h3>
    <div class="frow">
      <div class="fg"><label>Коллекция</label><input id="g-col" list="dl-col" placeholder="Sakura" autocomplete="off"><datalist id="dl-col"></datalist></div>
      <div class="fg"><label>Модель / Стикер</label><input id="g-mod" list="dl-mod" placeholder="Silver Cat" autocomplete="off"><datalist id="dl-mod"></datalist></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Фон</label><input id="g-bg" list="dl-bg" placeholder="Blue" autocomplete="off"><datalist id="dl-bg"></datalist></div>
      <div class="fg"><label>Цена (TON)</label><input id="g-pr" type="number" step="0.01" inputmode="decimal" placeholder="12.5"></div>
    </div>
    <div class="fg"><label>Дата покупки</label><input id="g-dt" type="date"></div>
    <div class="fg"><label>Фото (Ctrl+V)</label><div class="g-img-zone" id="g-img-zone">📋 Вставьте скриншот</div></div>
    <button class="btn-p" id="g-submit" onclick="addGift()">Добавить</button>
  </div>
</div>

<script>
const API = 'https://n8n.omut.studio/webhook';
const tg  = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.expand(); tg.ready(); }

let debts = [], gifts = [], curDebt = null, curGift = null;
let tonRate = null, tonRateAt = 0, curTab = 'debts';
let _giftImgData = null;
let sortMode = null; // 'debts' | 'gifts' | null

// ── ORDER ─────────────────────────────────────────
function getOrder(key) { try { return JSON.parse(localStorage.getItem('ord_'+key)||'[]'); } catch(e){ return []; } }
function setOrder(key, arr) { localStorage.setItem('ord_'+key, JSON.stringify(arr)); }
function applyOrder(items, key) {
  var order = getOrder(key);
  if (!order.length) return items.slice();
  var map = {}; items.forEach(function(x){ map[x.id]=x; });
  var sorted = [];
  order.forEach(function(id){ if(map[id]){ sorted.push(map[id]); delete map[id]; } });
  Object.keys(map).forEach(function(id){ sorted.push(map[id]); });
  return sorted;
}
function toggleSort(type) {
  sortMode = (sortMode===type) ? null : type;
  if (type==='debts') renderDebts(); else renderGifts();
}
function moveItem(type, id, dir) {
  var key = type;
  var items = type==='debts' ? debts.filter(function(d){return !d.closedAt;}) : gifts.slice().reverse();
  var ordered = applyOrder(items, key);
  var idx = ordered.findIndex ? ordered.findIndex(function(x){return x.id===id;}) : (function(){ for(var i=0;i<ordered.length;i++) if(ordered[i].id===id) return i; return -1; })();
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= ordered.length) return;
  var tmp = ordered[idx]; ordered[idx]=ordered[newIdx]; ordered[newIdx]=tmp;
  setOrder(key, ordered.map(function(x){return x.id;}));
  haptic('light');
  if (type==='debts') renderDebts(); else renderGifts();
}

// ── AUTOCOMPLETE ──────────────────────────────────
function getAC(field) { try { return JSON.parse(localStorage.getItem('ac_'+field)||'[]'); } catch(e){ return []; } }
function addAC(field, val) {
  if (!val) return;
  var arr = getAC(field);
  var i = arr.indexOf(val); if (i!==-1) arr.splice(i,1);
  arr.unshift(val); if(arr.length>40) arr.pop();
  localStorage.setItem('ac_'+field, JSON.stringify(arr));
}
function updateDL(dlId, field) {
  var dl = document.getElementById(dlId); if(!dl) return;
  dl.innerHTML = getAC(field).map(function(v){ return '<option value="'+esc(v)+'">'; }).join('');
}

function resizeImage(dataURL, maxPx, cb) {
  var img = new Image();
  img.onload = function() {
    var s = Math.min(maxPx/img.width, maxPx/img.height, 1);
    var c = document.createElement('canvas');
    c.width = img.width*s; c.height = img.height*s;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    cb(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = dataURL;
}

document.addEventListener('paste', function(e) {
  var inAdd = document.getElementById('ov-gift-add').classList.contains('open');
  var inDet = document.getElementById('ov-gift-det').classList.contains('open');
  if (!inAdd && !inDet) return;
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      var blob = items[i].getAsFile();
      var reader = new FileReader();
      reader.onload = function(ev) {
        resizeImage(ev.target.result, 400, function(small) {
          if (inAdd) {
            _giftImgData = small;
            var zone = document.getElementById('g-img-zone');
            if (zone) { zone.style.backgroundImage='url('+small+')'; zone.textContent=''; zone.classList.add('has-img'); }
          } else if (inDet && curGift) {
            try { localStorage.setItem('gimg_'+curGift.id, small); } catch(x){}
            var zone = document.getElementById('gd-img-zone');
            if (zone) { zone.style.backgroundImage='url('+small+')'; zone.textContent=''; zone.classList.add('has-img'); }
            renderGifts();
          }
          haptic('light');
        });
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});

// ── TABS ──────────────────────────────────────────
function showTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['debts','gifts','ton'][i]===t));
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');

  if (t === 'debts') {
    setupMainBtn('＋ Добавить', openDebtAdd);
  } else if (t === 'gifts') {
    setupMainBtn('＋ Добавить подарок', openGiftAdd);
    if (!gifts.length) loadGifts();
    if (!tonRate || Date.now()-tonRateAt > 300000) loadTonRate();
  } else {
    if (tg) tg.MainButton.hide();
    if (!tonRate || Date.now()-tonRateAt > 300000) loadTonRate();
  }
}

function setupMainBtn(text, fn) {
  if (!tg) return;
  tg.MainButton.setText(text);
  tg.MainButton.show();
  tg.MainButton.onClick && tg.MainButton.offClick(tg.MainButton._lastCb);
  tg.MainButton._lastCb = fn;
  tg.MainButton.onClick(fn);
}

// ── UTILS ─────────────────────────────────────────
function fmt(n) { return new Intl.NumberFormat('ru-RU').format(Math.round(Number(n||0))) + '\u00A0₽'; }
function fmtTon(n) { return (+n||0).toFixed(2) + '\u00A0TON'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(s) {
  var p = String(s||'').trim().split(/\s+/);
  return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : String(s||'?')[0].toUpperCase();
}
function daysSince(d) {
  if (!d) return '';
  var days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (days === 0) return 'сегодня';
  if (days === 1) return 'вчера';
  if (days < 7)  return days + '\u00A0дн.';
  if (days < 30) return Math.floor(days/7) + '\u00A0нед.';
  if (days < 365) return Math.floor(days/30) + '\u00A0мес.';
  return Math.floor(days/365) + '\u00A0г.';
}
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return d; }
}
function debtTotal(d) {
  return (d.history||[]).reduce(function(s,h){ return s+Number(h.amount||0); },0);
}
function getDeadline(id) {
  try { return JSON.parse(localStorage.getItem('dl_'+id)||'null'); } catch(e){ return null; }
}
function setDeadline(id, date) {
  if (date) localStorage.setItem('dl_'+id, JSON.stringify(date));
  else localStorage.removeItem('dl_'+id);
}
function deadlineBadge(deadline) {
  if (!deadline) return '';
  var ms = new Date(deadline).getTime() - Date.now();
  var days = Math.ceil(ms / 86400000);
  if (days > 0) return '<div class="bdg bdg-green">через '+days+'\u00A0дн.</div>';
  if (days === 0) return '<div class="bdg bdg-days">сегодня</div>';
  return '<div class="bdg bdg-days">'+Math.abs(days)+'\u00A0дн. просрочен</div>';
}
function haptic(type) { try { if(tg) tg.HapticFeedback.impactOccurred(type||'medium'); } catch(e){} }
function notify(type) { try { if(tg) tg.HapticFeedback.notificationOccurred(type||'success'); } catch(e){} }

// ── DEBTS ─────────────────────────────────────────
function loadDebts() {
  fetch(API+'/freelance-api').then(r=>r.json()).then(function(d) {
    debts = d.debts || [];
    debts.forEach(function(d){ d._deadline = getDeadline(d.id); });
    renderDebts();
  }).catch(function() {
    document.getElementById('debts-list').innerHTML = '<div class="empty"><i>⚠️</i><b>Ошибка загрузки</b><span>Проверьте соединение</span></div>';
  });
}

function renderDebts() {
  var active = debts.filter(function(d){ return !d.closedAt; });
  var closed = debts.filter(function(d){ return d.closedAt; });
  var total  = active.reduce(function(s,d){ return s+debtTotal(d); },0);

  var sum = document.getElementById('debts-summary');
  if (debts.length) {
    sum.innerHTML = '<div class="summary"><div class="sum-left"><div class="amount">'+fmt(total)+'</div><div class="label">активных долгов</div></div><div class="sum-badge">'+active.length+'</div></div>';
  } else { sum.innerHTML = ''; }

  var isSortD = sortMode === 'debts';
  var html = '<div class="sort-bar"><button class="sort-toggle-btn'+(isSortD?' active':'')+'" onclick="toggleSort(\'debts\')">'+(isSortD?'✓ Готово':'⇅ Порядок')+'</button></div>';
  var orderedActive = applyOrder(active, 'debts');
  orderedActive.forEach(function(d) {
    var tot = debtTotal(d);
    var dl  = d._deadline;
    if (isSortD) {
      html += '<div class="card" style="cursor:default">'
        + '<div class="sort-arrows">'
        + '<button class="sort-arrow" onclick="moveItem(\'debts\',\''+esc(d.id)+'\',-1)">↑</button>'
        + '<button class="sort-arrow" onclick="moveItem(\'debts\',\''+esc(d.id)+'\',1)">↓</button>'
        + '</div>'
        + '<div class="av av-d">'+esc(initials(d.company))+'</div>'
        + '<div class="cbody"><div class="ctitle">'+esc(d.company)+'</div>'
        + '<div class="csub">'+esc(d.project)+(d.manager?' · '+esc(d.manager):'')+'</div></div>'
        + '<div class="cright"><div class="camt red">'+fmt(tot)+'</div>'
        + deadlineBadge(dl)+'</div></div>';
    } else {
      html += '<div class="card" onclick="openDebtDet(\''+esc(d.id)+'\')">'
        + '<div class="av av-d">'+esc(initials(d.company))+'</div>'
        + '<div class="cbody"><div class="ctitle">'+esc(d.company)+'</div>'
        + '<div class="csub">'+esc(d.project)+(d.manager?' · '+esc(d.manager):'')+'</div></div>'
        + '<div class="cright"><div class="camt red">'+fmt(tot)+'</div>'
        + deadlineBadge(dl)+'</div></div>';
    }
  });
  closed.forEach(function(d) {
    var ds = daysSince(d.closedAt);
    html += '<div class="card closed" onclick="openDebtDet(\''+esc(d.id)+'\')">'
      + '<div class="av av-d">'+esc(initials(d.company))+'</div>'
      + '<div class="cbody"><div class="ctitle">'+esc(d.company)+'</div>'
      + '<div class="csub">'+esc(d.project)+'</div></div>'
      + '<div class="cright"><div class="camt">'+fmt(Number(d.amount||0))+'</div>'
      + '<div class="bdg bdg-done">закрыт'+( ds?' '+ds:'')+'</div>'
      + '</div></div>';
  });
  if (!html) html = '<div class="empty"><i>📭</i><b>Долгов нет</b><span>Нажмите + чтобы добавить</span></div>';
  document.getElementById('debts-list').innerHTML = html;
}

// ── ADD DEBT ──────────────────────────────────────
function openDebtAdd() {
  haptic('light');
  ['d-co','d-pr','d-mg'].forEach(function(id){ document.getElementById(id).value=''; });

  if(tg) tg.BackButton.show(), tg.BackButton.onClick(closeDebtAdd);

}
function closeDebtAdd() {
  document.getElementById('ov-debt-add').classList.remove('open');
  if(tg) tg.BackButton.hide();
}
function addDebt() {
  var co=document.getElementById('d-co').value.trim();
  var pr=document.getElementById('d-pr').value.trim();
  var mg=document.getElementById('d-mg').value.trim();
  if (!co) { if(tg) tg.showAlert('Укажите компанию'); else alert('Укажите компанию'); return; }

// ── DEBT DETAIL ───────────────────────────────────
function openDebtDet(id) {
  haptic('light');
  curDebt = debts.find(function(d){ return d.id===id; });
  if (!curDebt) return;
  renderDet();
  document.getElementById('ov-debt-det').classList.add('open');
  if(tg) tg.BackButton.show(), tg.BackButton.onClick(closeDebtDet);
}
function closeDebtDet() {
  document.getElementById('ov-debt-det').classList.remove('open');
  if(tg) tg.BackButton.hide();
  curDebt=null;
}
function renderDet() {
  var d = curDebt; if(!d) return;
  var tot = debtTotal(d);
  var hist = d.history||[];
  var dl = d._deadline || '';
  var html = '<div class="det-head">'
    + '<div class="det-av">'+esc(initials(d.company))+'</div>'
    + '<div class="det-info"><h4>'+esc(d.company)+'</h4><p>'+esc(d.project)+(d.manager?' · '+esc(d.manager):'')+'</p></div></div>';

  html += '<div class="det-total"><span>Долг</span><b>'+fmt(tot)+'</b></div>';

  html += '<div class="save-date-row">'
    + '<div class="fg"><label>Дедлайн</label><input id="det-close-dt" type="date" value="'+esc(dl)+'"></div>'
    + '<button class="btn-save" onclick="saveDeadline()">Сохранить</button>'
    + '</div>';

  html += '<div class="div"></div>';
  html += '<div class="fg"><label>Добавить (₽)</label><input id="det-pay-am" type="number" inputmode="numeric" placeholder="5000"></div>';
  html += '<button class="btn-p" id="det-pay-btn" onclick="addWork()">Записать работу</button>';

  html += '<div class="hist-hd">История работы</div>';
  if (hist.length) {
    hist.slice().reverse().forEach(function(h){
      html += '<div class="hist-row"><span>'+fmtDate(h.date)+'</span><span style="font-weight:600;color:var(--btn)">+'+fmt(h.amount)+'</span></div>';
    });
    html += '<div class="hist-row"><span style="font-weight:600">Итого</span><span style="font-weight:700;color:var(--btn)">'+fmt(tot)+'</span></div>';
  } else {
    html += '<div class="hist-empty">Записей ещё нет</div>';
  }

  html += '<div class="div"></div>';
  html += '<button class="btn-d" onclick="delDebt()">🗑 Удалить</button>';

  document.getElementById('det-content').innerHTML = html;
}
function saveDeadline() {
  var dt = document.getElementById('det-close-dt');
  var val = dt ? dt.value : '';
  setDeadline(curDebt.id, val || null);
  curDebt._deadline = val || null;
  haptic('light');
  notify('success');
  renderDet();
  renderDebts();
}
function addWork() {
  var am = document.getElementById('det-pay-am').value.trim();
  if (!am||Number(am)<=0) { if(tg) tg.showAlert('Введите сумму'); else alert('Введите сумму'); return; }
  var btn=document.getElementById('det-pay-btn'); btn.disabled=true;
  fetch(API+'/freelance-api-history?id='+encodeURIComponent(curDebt.id)+'&amount='+encodeURIComponent(am))
    .then(function(r){return r.json();})
    .then(function(d){
      btn.disabled=false;
      if(d.ok){ notify('success'); curDebt.history=curDebt.history||[]; curDebt.history.push({amount:Number(am),date:new Date().toISOString()}); renderDet(); loadDebts(); }
    }).catch(function(){ btn.disabled=false; });
}
function delDebt() {
  function go() {
    haptic('heavy');
    fetch(API+'/freelance-api-del?id='+encodeURIComponent(curDebt.id))
      .then(function(r){return r.json();})
      .then(function(d){ if(d.ok){ notify('success'); closeDebtDet(); loadDebts(); } });
  }
  if(tg) tg.showConfirm('Удалить долг «'+curDebt.company+'»?', function(ok){ if(ok) go(); });
  else if(confirm('Удалить?')) go();
}

// ── GIFTS ─────────────────────────────────────────
function loadGifts() {
  fetch(API+'/freelance-gifts').then(r=>r.json()).then(function(d) {
    gifts = d.gifts || [];
    var pending = localStorage.getItem('gimg_pending');
    if (pending && gifts.length) {
      var last = gifts[gifts.length-1];
      if (last && last.id && !localStorage.getItem('gimg_'+last.id)) {
        try { localStorage.setItem('gimg_'+last.id, pending); localStorage.removeItem('gimg_pending'); } catch(e){}
      }
    }
    renderGifts();
  }).catch(function() {
    document.getElementById('gifts-list').innerHTML = '<div class="empty"><i>⚠️</i><b>Ошибка загрузки</b></div>';
  });
}

function renderGifts() {
  var totTon = gifts.reduce(function(s,g){ return s+Number(g.price||0); },0);
  var sum = document.getElementById('gifts-summary');
  if (gifts.length) {
    var rubStr = (tonRate ? ' · ' + fmt(totTon*tonRate) : '');
    sum.innerHTML = '<div class="summary"><div class="sum-left"><div class="amount">'+fmtTon(totTon)+'</div><div class="label">потрачено на подарки'+rubStr+'</div></div><div class="sum-badge">'+gifts.length+'</div></div>';
  } else { sum.innerHTML = ''; }

  var isSortG = sortMode === 'gifts';
  var orderedGifts = applyOrder(gifts.slice().reverse(), 'gifts');
  var html = '<div class="sort-bar"><button class="sort-toggle-btn'+(isSortG?' active':'')+'" onclick="toggleSort(\'gifts\')">'+(isSortG?'✓ Готово':'⇅ Порядок')+'</button></div>';
  orderedGifts.forEach(function(g) {
    var title = esc(g.collection)+(g.model?' · '+esc(g.model):'');
    var sub   = g.background ? '🎨 '+esc(g.background) : esc(g.date||'');
    var rubBdg = (tonRate&&g.price) ? ' <span class="bdg bdg-days">≈'+fmt(Number(g.price)*tonRate)+'</span>' : '';
    var gImg = g.id ? localStorage.getItem('gimg_'+g.id) : null;
    var avHtml = gImg
      ? '<div class="av av-g" style="background-image:url('+gImg+');background-size:cover;background-position:center"></div>'
      : '<div class="av av-g">🎁</div>';
    if (isSortG) {
      html += '<div class="card" style="cursor:default">'
        + '<div class="sort-arrows">'
        + '<button class="sort-arrow" onclick="moveItem(\'gifts\',\''+esc(g.id)+'\',-1)">↑</button>'
        + '<button class="sort-arrow" onclick="moveItem(\'gifts\',\''+esc(g.id)+'\',1)">↓</button>'
        + '</div>'
        + avHtml
        + '<div class="cbody"><div class="ctitle">'+title+'</div><div class="csub">'+sub+'</div></div>'
        + '<div class="cright"><div class="camt blue">'+fmtTon(g.price)+'</div>'+rubBdg
        + '<div class="bdg bdg-ton">'+esc(g.date||'')+'</div></div></div>';
    } else {
      html += '<div class="card" onclick="openGiftDet(\''+esc(g.id)+'\')">'
        + avHtml
        + '<div class="cbody"><div class="ctitle">'+title+'</div><div class="csub">'+sub+'</div></div>'
        + '<div class="cright"><div class="camt blue">'+fmtTon(g.price)+'</div>'+rubBdg
        + '<div class="bdg bdg-ton">'+esc(g.date||'')+'</div></div></div>';
    }
  });
  if (orderedGifts.length===0) html = '<div class="empty"><i>🎁</i><b>Подарков нет</b><span>Нажмите + чтобы добавить</span></div>';
  document.getElementById('gifts-list').innerHTML = html;
}

// ── ADD GIFT ──────────────────────────────────────
function openGiftAdd() {
  haptic('light');
  ['g-col','g-mod','g-bg','g-pr'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('g-dt').value = new Date().toISOString().split('T')[0];
  _giftImgData = null;
  updateDL('dl-col','col'); updateDL('dl-mod','mod'); updateDL('dl-bg','bg');
  var zone = document.getElementById('g-img-zone');

  document.getElementById('ov-gift-add').classList.add('open');
  if(tg) tg.BackButton.show(), tg.BackButton.onClick(closeGiftAdd);
  setTimeout(function(){ document.getElementById('g-per').focus(); },300);
}
function closeGiftAdd() {
  document.getElementById('ov-gift-add').classList.remove('open');
  if(tg) tg.BackButton.hide();
}
function addGift() {
  var col=document.getElementById('g-col').value.trim();
  var mod=document.getElementById('g-mod').value.trim();
  var bg=document.getElementById('g-bg').value.trim();
  var pr=document.getElementById('g-pr').value.trim();
  var dt=document.getElementById('g-dt').value;
  if (!col) { if(tg) tg.showAlert('Укажите коллекцию'); else alert('Укажите коллекцию'); return; }
  var btn=document.getElementById('g-submit'); btn.disabled=true;
  fetch(API+'/freelance-gifts-add?person=&collection='+encodeURIComponent(col)+'&model='+encodeURIComponent(mod)+'&background='+encodeURIComponent(bg)+'&price='+encodeURIComponent(pr)+'&date='+encodeURIComponent(dt)+'&gift='+encodeURIComponent(col+(mod?' '+mod:'')))
    .then(function(r){return r.json();})
    .then(function(d){
      btn.disabled=false;
      if(d.ok){
        notify('success');
        addAC('col',col); addAC('mod',mod); addAC('bg',bg);
        if(_giftImgData) {
          if (d.id) {
            try { localStorage.setItem('gimg_'+d.id, _giftImgData); } catch(e){}
          } else {
            try { localStorage.setItem('gimg_pending', _giftImgData); } catch(e){}
          }
          _giftImgData = null;
        }
        closeGiftAdd(); loadGifts();
      } else { if(tg) tg.showAlert('Ошибка'); else alert('Ошибка'); }
    }).catch(function(){ btn.disabled=false; });
}
function openGiftDet(id) {
  haptic('light');
  curGift = gifts.find(function(g){ return g.id===id; });
  if (!curGift) return;
  renderGiftDet();
  document.getElementById('ov-gift-det').classList.add('open');
  if(tg) tg.BackButton.show(), tg.BackButton.onClick(closeGiftDet);
}
function closeGiftDet() {
  document.getElementById('ov-gift-det').classList.remove('open');
  if(tg) tg.BackButton.hide();
  curGift = null;
}
function renderGiftDet() {
  var g = curGift; if(!g) return;
  var gImg = g.id ? localStorage.getItem('gimg_'+g.id) : null;
  var zoneHtml = gImg
    ? '<div class="g-img-zone has-img" id="gd-img-zone" style="background-image:url('+gImg+');height:160px"></div>'
    : '<div class="g-img-zone" id="gd-img-zone" style="height:160px">📋 Вставьте фото (Ctrl+V)</div>';

  var html = '<div class="det-head">'
    + '<div class="det-av" style="background:var(--ton)">🎁</div>'
    + '<div class="det-info"><h4>'+esc(g.collection||'Подарок')+'</h4>'
    + '<p>'+esc(g.model||'')+(g.background?' · 🎨 '+esc(g.background):'')+'</p></div></div>';

  html += '<div class="fg"><label>Фото (Ctrl+V)</label>'+zoneHtml+'</div>';

  html += '<div class="det-total"><span>Цена</span><b style="color:var(--ton)">'+fmtTon(g.price)+'</b></div>';

  if (g.collection||g.model) {
    html += '<div class="hist-hd">Детали</div>';
    if (g.collection) html += '<div class="hist-row"><span>Коллекция</span><span>'+esc(g.collection)+'</span></div>';
    if (g.model)      html += '<div class="hist-row"><span>Модель</span><span>'+esc(g.model)+'</span></div>';
    if (g.background) html += '<div class="hist-row"><span>Фон</span><span>'+esc(g.background)+'</span></div>';
    if (g.date)       html += '<div class="hist-row"><span>Дата</span><span>'+esc(g.date)+'</span></div>';
    if (tonRate&&g.price) html += '<div class="hist-row"><span>В рублях</span><span>≈'+fmt(Number(g.price)*tonRate)+'</span></div>';
  }

  html += '<div class="div"></div>';
  html += '<button class="btn-d" onclick="delGiftFromDet()">🗑 Удалить</button>';

  document.getElementById('gift-det-content').innerHTML = html;
}
function delGiftFromDet() {
  if (!curGift) return;
  function go() {
    haptic('heavy');
    var id = curGift.id;
    fetch(API+'/freelance-gifts-del?id='+encodeURIComponent(id))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){
          notify('success');
          try { localStorage.removeItem('gimg_'+id); } catch(e){}
          closeGiftDet(); loadGifts();
        }
      });
  }
  var name = curGift.collection+(curGift.model?' · '+curGift.model:'');
  if(tg) tg.showConfirm('Удалить «'+name+'»?', function(ok){ if(ok) go(); });
  else if(confirm('Удалить?')) go();
}

// ── TON ───────────────────────────────────────────
function loadTonRate() {
  fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=rub')
    .then(function(r){return r.json();})
    .then(function(d){
      var r = d['the-open-network'] && d['the-open-network']['rub'];
      if(r){ tonRate=r; tonRateAt=Date.now(); renderTon(); if(curTab==='gifts') renderGifts(); }
    }).catch(function(){});
}
function renderTon() {
  var bal    = parseFloat(document.getElementById('ton-bal').value)||0;
  var gifts_sum = gifts.reduce(function(s,g){ return s+Number(g.price||0); },0);
  document.getElementById('ton-gifts-total').textContent = fmtTon(gifts_sum);
  document.getElementById('ton-portfolio-ton').textContent = fmtTon(bal + gifts_sum);
  if (tonRate) {
    var age = Math.floor((Date.now()-tonRateAt)/60000);
    document.getElementById('ton-rate-val').textContent = fmt(tonRate).replace('\u00A0₽','') + '\u00A0₽';
    document.getElementById('ton-age').textContent = age < 1 ? ' · только что' : ' · '+age+'\u00A0мин. назад';
    var portfolio = (bal + gifts_sum) * tonRate;
    document.getElementById('ton-portfolio').textContent = fmt(portfolio);
  }
}

document.getElementById('ton-bal').addEventListener('input', function(){
  if (/^[\d\.\s]*$/.test(this.value)) {
    localStorage.setItem('ton_bal', this.value);
    renderTon();
  }
});
document.getElementById('ton-bal').addEventListener('keydown', function(e){
  if (e.key === 'Enter') {
    var val = this.value.trim();
    if (/^[\d\s\+\-\*\/\.\(\)]+$/.test(val)) {
      try {
        var result = Function('return (' + val + ')')();
        if (typeof result === 'number' && isFinite(result)) {
          this.value = parseFloat(result.toFixed(4));
          localStorage.setItem('ton_bal', this.value);
          renderTon();
          haptic('light');
        }
      } catch(e) {}
    }
    e.preventDefault();
    this.blur();
  }
});
document.getElementById('ton-bal').value = localStorage.getItem('ton_bal') || '';
